<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d3e"/>
      <stop offset="100%" style="stop-color:#0f2e26"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9dc7a"/>
      <stop offset="50%" style="stop-color:#d4a84b"/>
      <stop offset="100%" style="stop-color:#966e20"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="60" fill="url(#bg)"/>
  
  <!-- 外框 -->
  <rect x="30" y="30" width="452" height="452" rx="40" fill="none" stroke="url(#gold)" stroke-width="6"/>
  
  <!-- 内框 -->
  <rect x="50" y="50" width="412" height="412" rx="30" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  
  <!-- 星星装饰 -->
  <polygon points="256,80 270,130 325,130 280,165 295,215 256,180 217,215 232,165 187,130 242,130" fill="url(#gold)"/>
  
  <!-- 月亮 -->
  <circle cx="180" cy="280" r="60" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="200" cy="260" r="50" fill="url(#bg)"/>
  
  <!-- 太阳 -->
  <circle cx="332" cy="280" r="50" fill="url(#gold)"/>
  <g stroke="url(#gold)" stroke-width="3">
    <line x1="332" y1="210" x2="332" y2="190"/>
    <line x1="332" y1="350" x2="332" y2="370"/>
    <line x1="262" y1="280" x2="242" y2="280"/>
    <line x1="402" y1="280" x2="422" y2="280"/>
    <line x1="282" y1="230" x2="268" y2="216"/>
    <line x1="382" y1="230" x2="396" y2="216"/>
    <line x1="282" y1="330" x2="268" y2="344"/>
    <line x1="382" y1="330" x2="396" y2="344"/>
  </g>
  
  <!-- 底部装饰 -->
  <polygon points="256,350 280,400 330,400 295,435 310,485 256,455 202,485 217,435 182,400 232,400" fill="url(#gold)" opacity="0.8"/>
  
  <!-- 装饰符号 -->
  <text x="256" y="180" text-anchor="middle" fill="url(#gold)" font-size="24" font-family="serif">★</text>
</svg>
